<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>خريطة مارفل المعرفية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="app">
  <header>
    <h1>خريطة <span>مارفل</span> المعرفية</h1>
    <div class="toolbar">
      <button id="viewRowsBtn" class="active">📺 صفوف</button>
      <button id="viewGraphBtn">🕸️ شبكة</button>
      <button id="metricsBtn">📊 إحصائيات</button>
      <button id="shortestPathBtn">🧭 أقصر مسار</button>
      <button id="networkAnalysisBtn">🕸️ تحليل الشبكة</button>
      <button id="addNodeBtn" class="primary">➕ إضافة فيلم/مسلسل</button>
      <button id="bgBtn">🖼️ تغيير الخلفية</button>
      <button id="bgResetBtn" title="رجوع للخلفية الافتراضية">↺ إزالة الخلفية</button>
      <input type="file" id="bgFileInput" accept="image/*" hidden>
      <button id="exportDataBtn" title="نزّل نسخة احتياطية من إضافاتك (عناصر/روابط/خلفية)">⬇️ تصدير بياناتي</button>
      <button id="importDataBtn" title="استرجاع نسخة احتياطية سابقة">⬆️ استيراد بيانات</button>
      <input type="file" id="importDataFileInput" accept="application/json" hidden>
    </div>
  </header>
  <div id="status">بيتحمّل...</div>
  <div id="errorToast" class="error-toast" role="alert" hidden></div>

  <div id="filterBar">
    <div class="search-wrap">
      <input type="text" id="globalSearchInput" placeholder="🔍 ابحث بالاسم في كل عناصر الخريطة...">
      <div id="globalSearchDropdown" class="search-dropdown" hidden></div>
    </div>
    <div id="typeFilterChips"></div>
  </div>

  <div id="rowsView"></div>
  <div id="graphView"><svg id="graphSvg"></svg></div>
</div>

<div class="overlay" id="detailOverlay">
  <div class="modal">
    <button class="modal-close" id="detailClose">×</button>
    <div id="detailBody"></div>
  </div>
</div>

<div class="overlay" id="addModal">
  <div class="modal">
    <button class="modal-close" id="addClose">×</button>
    <h3>إضافة فيلم أو مسلسل جديد</h3>
    <input type="text" id="searchInput" placeholder="اكتب اسم الفيلم أو المسلسل بالإنجليزي...">
    <div id="searchResults"></div>
    <div id="addStep2" style="display:none;">
      <p id="pickedTitle" style="font-weight:700;"></p>
      <label style="font-size:13px;color:var(--muted);">اختر المجموعة الزمنية:</label>
      <select id="groupSelect"></select>
      <button class="primary" id="confirmAddBtn" style="width:100%;">✅ أضف للخريطة</button>
    </div>
  </div>
</div>

<div class="overlay" id="linkModal">
  <div class="modal">
    <button class="modal-close" id="linkModalClose">×</button>
    <h3>🔗 اربط "<span id="linkFromTitle"></span>" بعقدة تانية</h3>
    <input type="text" id="linkTargetSearch" placeholder="دوّر باسم عنصر موجود في الخريطة...">
    <div id="linkTargetResults"></div>
    <textarea id="linkReasonInput" placeholder="سبب الربط أو التلميح (مثال: مشهد ما بعد التتر بيربط الفيلمين بـ...)"></textarea>
    <button class="primary" id="confirmLinkBtn" style="width:100%;">✅ احفظ الرابط</button>
  </div>
</div>

<div class="overlay" id="metricsModal">
  <div class="modal">
    <button class="modal-close" id="metricsModalClose">×</button>
    <h3>📊 إحصائيات الشبكة</h3>
    <div id="metricsBody"></div>
  </div>
</div>

<div class="overlay" id="shortestPathModal">
  <div class="modal">
    <button class="modal-close" id="shortestPathModalClose">×</button>
    <h3>🧭 أقصر مسار بين عنصرين</h3>
    <label class="sp-label">من:</label>
    <input type="text" id="spFromSearch" placeholder="دوّر باسم عنصر...">
    <div id="spFromResults" class="sp-results"></div>
    <label class="sp-label">إلى:</label>
    <input type="text" id="spToSearch" placeholder="دوّر باسم عنصر...">
    <div id="spToResults" class="sp-results"></div>
    <button class="primary" id="spCalcBtn" style="width:100%;">🧭 احسب المسار</button>
    <div id="spResultBody"></div>
  </div>
</div>

<div class="overlay" id="networkAnalysisModal">
  <div class="modal">
    <button class="modal-close" id="networkAnalysisModalClose">×</button>
    <h3>🕸️ تحليل الشبكة</h3>
    <div id="networkAnalysisBody"></div>
  </div>
</div>

<!-- ============================================================
     ترتيب تحميل الطبقات مهم: كل طبقة بتعتمد على اللي قبلها.
     config/utils → storage → knowledge → business/graph → render → app
     ============================================================ -->
<script src="js/logger.js"></script>
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/storageLayer.js"></script>
<script src="js/knowledgeLayer.js"></script>
<script src="js/businessLayer.js"></script>
<script src="js/graphLayer.js"></script>
<script src="js/renderLayer.js"></script>
<!-- ============================================================
     نظام الـ Plugins (أساس فقط، بدون أي plugin فعلي حاليًا):
     أي حد عايز يضيف plugin، يسجّله هنا (أو في سكريبت خارجي منفصل يتحط
     مكان الكومنت ده) قبل ما app.js يشتغل. app.js بيقرأ من
     window.MarvelMapPlugins ويعمل init() لكل واحد بعد ما التطبيق يجهز
     بالكامل. التفاصيل والـ context المتاح موثّقة في src/core/PluginManager.js.

     مثال (معطّل — احذف التعليق عشان تجرّبه):
     window.MarvelMapPlugins = window.MarvelMapPlugins || [];
     window.MarvelMapPlugins.push({
       name: 'console-logger-example',
       init({ eventBus }){
         eventBus.on('node:added', ({ node })=> console.log('عقدة جديدة اتضافت:', node.title));
       }
     });
     ============================================================ -->
<script>window.MarvelMapPlugins = window.MarvelMapPlugins || [];</script>
<script src="js/app.js"></script>
</body>
</html>
